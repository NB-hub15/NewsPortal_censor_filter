<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая новость</title>
</head>
<body>
    <h2>{{ post.title }}</h2>
    <p>Здравствуй, {{ username }}. Новая статья в твоём любимом разделе!</p>
    <p>{{ post.text|truncatechars:50 }}</p>
    <p><a href="http://127.0.0.1:8000/news/{{ post.id }}/">Читать полностью</a></p>
</body>
</html>
